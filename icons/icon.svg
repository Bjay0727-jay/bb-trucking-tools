<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Truck icon simplified -->
  <g fill="#ffffff">
    <!-- Truck body -->
    <rect x="80" y="200" width="240" height="140" rx="16"/>
    <!-- Cab -->
    <path d="M320 240 L400 240 L432 300 L432 340 L320 340 Z"/>
    <!-- Wheels -->
    <circle cx="160" cy="360" r="40"/>
    <circle cx="380" cy="360" r="40"/>
    <!-- Wheel centers -->
    <circle cx="160" cy="360" r="16" fill="#f97316"/>
    <circle cx="380" cy="360" r="16" fill="#f97316"/>
    <!-- Fuel pump icon on truck -->
    <rect x="120" y="240" width="60" height="60" rx="8" fill="#0f172a"/>
    <rect x="140" y="220" width="20" height="20" fill="#0f172a"/>
  </g>
  <!-- Dollar sign -->
  <g fill="#0f172a" transform="translate(340, 120) scale(0.8)">
    <text x="0" y="80" font-family="Arial Black, sans-serif" font-size="100" font-weight="900">$</text>
  </g>
</svg>
